packages:
  - "apps/*"
  - "packages/*"

# Build-script allowlist (pnpm v10+ requires explicit opt-in for native postinstalls).
# All are required for the apps to function:
#   - sharp             — Payload v3 image processing (Media collection)
#   - esbuild           — tsx (seed runner) + Next.js dev bundler
#   - msgpackr-extract  — Payload internal caching
#   - unrs-resolver     — Next 15 / TS path-mapping resolver
#   - turbo             — Turborepo runner
allowBuilds:
  esbuild: true
  msgpackr-extract: true
  sharp: true
  turbo: true
  unrs-resolver: true
