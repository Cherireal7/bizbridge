# Minimal Docker Compose for BizBridge Ethiopia.
# Runs the Next.js + Payload web app; talks to an external Neon Postgres.
# Pair with a reverse proxy (Caddy / nginx / Traefik) on the host for TLS.

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: bizbridge/web:latest
    container_name: bizbridge-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"   # bind localhost only; reverse-proxy handles public :443
    env_file:
      - .env.production
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/', r => process.exit(r.statusCode >= 200 && r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
